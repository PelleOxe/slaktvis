<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Släktvis</title>
<style>
/* ══ TEMAN ══ */
[data-theme="light"]{
  --accent:#2c4a3e;--accent-mid:#3d6b5c;--accent-light:#e8f0ed;
  --amber:#b8721a;--amber-bg:#fdf0e0;
  --male:#2a5fa8;--male-bg:#e8f0fb;
  --female:#9a2e72;--female-bg:#fae8f4;
  --text:#1a1a18;--text-sec:#4a4a44;--text-muted:#706e68;
  --border:#ccc8c0;--bg:#d8d2c8;--surface:#f5f2ee;
  --header-bg:#1a2e26;--header-text:#f0f8f4;--header-sub:rgba(240,248,244,.65);
  --scroll:#c8c4bc;
}
[data-theme="dark"]{
  --accent:#6aaf96;--accent-mid:#5a9e87;--accent-light:#1a2e28;
  --amber:#d4963a;--amber-bg:#2a1f0a;
  --male:#5a8fd4;--male-bg:#0e1e36;
  --female:#c46aaa;--female-bg:#2a0e22;
  --text:#e8e4de;--text-sec:#b0aca6;--text-muted:#807c76;
  --border:#3a3632;--bg:#111008;--surface:#1e1c18;
  --header-bg:#080806;--header-text:#f0ece6;--header-sub:rgba(240,236,230,.60);
  --scroll:#3a3632;
}
[data-theme="parchment"]{
  --accent:#6b3d14;--accent-mid:#8a5020;--accent-light:#f5e8d0;
  --amber:#d4920a;--amber-bg:#fdf0dc;
  --male:#1e4878;--male-bg:#e8eef8;
  --female:#7a1e5a;--female-bg:#f8e8f4;
  --text:#2a1a08;--text-sec:#4e3418;--text-muted:#826040;
  --border:#c0a070;--bg:#ddc89a;--surface:#f5ecd4;
  --header-bg:#241004;--header-text:#fff8e8;--header-sub:rgba(255,248,232,.70);
  --scroll:#c0a070;
  font-family:'Palatino Linotype',Palatino,Georgia,serif !important;
}
*{box-sizing:border-box;margin:0;padding:0;}
:root{--r:10px;--gap:6px;}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;
  overflow:hidden;font-family:Georgia,'Times New Roman',serif;font-size:13px;transition:background .2s,color .2s;}

/* ══ HEADER ══ */
#header{background:var(--header-bg);color:var(--header-text);padding:7px 12px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:2px solid var(--amber);}
#header h1{font-size:17px;font-weight:normal;letter-spacing:1px;color:var(--header-text);white-space:nowrap;}
#header h1 span{color:var(--amber);}
.hdr-btn{background:var(--amber);color:#fff;border:none;padding:5px 12px;border-radius:7px;
  font-size:12px;cursor:pointer;font-family:sans-serif;white-space:nowrap;}
.hdr-btn:hover{opacity:.88;}
#theme-group{display:flex;gap:3px;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:2px;}
.theme-btn{background:transparent;color:var(--header-sub);border:none;padding:3px 9px;border-radius:6px;
  font-size:12px;cursor:pointer;font-family:sans-serif;white-space:nowrap;transition:background .15s,color .15s;}
.theme-btn:hover{color:var(--header-text);}
.theme-btn.active{background:rgba(255,255,255,.2);color:var(--header-text);}
/* Språkflaggor */
#lang-group{display:flex;gap:2px;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:2px;background:rgba(255,255,255,.08);}
.lang-btn{background:transparent;border:none;padding:3px 7px;border-radius:6px;font-size:17px;
  cursor:pointer;transition:background .15s;line-height:1;opacity:.55;}
.lang-btn:hover{background:rgba(255,255,255,.2);opacity:1;}
.lang-btn.active{background:rgba(255,255,255,.28);opacity:1;box-shadow:0 0 0 1px rgba(255,255,255,.4);}
#info-block{font-family:sans-serif;font-size:12px;color:var(--header-sub);margin-left:auto;text-align:right;line-height:1.5;}
#info-block strong{color:var(--header-text);font-size:14px;}
#copyright{font-family:sans-serif;font-size:11px;color:var(--header-sub);white-space:nowrap;opacity:.75;}
/* Dropdown-meny */
.omenu-item{padding:9px 14px;cursor:pointer;font-family:sans-serif;font-size:13px;
  color:var(--text);border-bottom:1px solid var(--border);line-height:1.3;}
.omenu-item:last-child{border-bottom:none;}
.omenu-item:hover{background:var(--accent-light);}
input[type="file"]{display:none;}

/* ══ LAYOUT ══ */
#main{display:grid;grid-template-columns:256px 1fr;flex:1;overflow:hidden;padding:var(--gap);gap:var(--gap);}
#left-col{display:flex;flex-direction:column;gap:var(--gap);overflow:hidden;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.panel-head{font-family:sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.9px;
  color:var(--text-muted);padding:5px 10px 5px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;}
.gen-controls{display:flex;align-items:center;gap:3px;margin-left:auto;}
.gen-btn{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text-sec);
  font-size:13px;font-family:sans-serif;width:22px;height:22px;cursor:pointer;line-height:1;padding:0;
  display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s;}
.gen-btn:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent-mid);}
.gen-btn:disabled{opacity:.35;cursor:default;}
#gen-count{font-size:12px;font-family:sans-serif;color:var(--text-sec);min-width:18px;text-align:center;}
#search-box{padding:8px;border-bottom:1px solid var(--border);}
#search-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:7px;
  font-size:13px;font-family:sans-serif;background:var(--bg);color:var(--text);}
#search-input:focus{outline:none;border-color:var(--accent-mid);}
#search-input::placeholder{color:var(--text-muted);}
#person-list{flex:1;overflow-y:auto;}
.person-item{padding:6px 12px;cursor:pointer;font-size:13px;font-family:sans-serif;color:var(--text);
  border-left:3px solid transparent;line-height:1.4;}
.person-item:hover{background:var(--accent-light);}
.person-item.selected{background:var(--accent-light);border-left-color:var(--accent);font-weight:bold;}
.person-item .p-dates{font-size:11px;color:var(--text-muted);}
.person-item .callname{color:var(--amber);font-style:italic;}
#empty-state{padding:32px 16px;text-align:center;font-family:sans-serif;color:var(--text-muted);font-size:13px;line-height:1.8;}
#empty-state .icon{font-size:28px;margin-bottom:10px;}

/* ══ RIGHT ══ */
#right-col{display:grid;grid-template-rows:auto 1fr;gap:var(--gap);overflow:hidden;}

/* ══ BLOCK D ══ */
#block-d{overflow:hidden;min-height:0;}
#block-d-inner{overflow:auto;padding:6px 10px 8px;}
#ancestor-chart{display:flex;align-items:stretch;height:270px;transition:height .3s ease;}
#fan-chart{width:100%;height:583px;display:none;}
#fan-chart svg{width:100%;height:100%;}
/* Vy-lägesväljare */
.view-btns{display:flex;gap:2px;margin-right:8px;}
.view-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:5px;
  color:var(--header-sub);font-size:11px;font-family:sans-serif;padding:2px 8px;cursor:pointer;
  white-space:nowrap;transition:background .12s,color .12s;}
.view-btn:hover{background:rgba(255,255,255,.2);color:var(--header-text);}
.view-btn.active{background:rgba(255,255,255,.28);color:var(--header-text);border-color:rgba(255,255,255,.5);}
/* panel-head ärver inte header-färger — separata färger */
.panel .view-btn{background:var(--bg);border-color:var(--border);color:var(--text-muted);}
.panel .view-btn:hover{background:var(--accent-light);color:var(--text);}
.panel .view-btn.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent-mid);}
/* Solfjäder-kort */
.fan-card{cursor:pointer;}
.fan-card:hover .fan-slice{opacity:.85;}
.fan-label{font-family:sans-serif;font-size:10px;pointer-events:none;fill:var(--text);}
.fan-label-sm{font-family:sans-serif;font-size:8.5px;pointer-events:none;fill:var(--text);}
.fan-center-text{font-family:sans-serif;font-size:11px;font-weight:bold;fill:var(--text);pointer-events:none;}
.anc-col{display:flex;flex-direction:column;justify-content:space-around;gap:5px;flex:1;min-width:120px;}
.anc-col.col-center{flex:1.4;}
.anc-connector{width:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.anc-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 9px;
  cursor:pointer;transition:border-color .12s,background .12s;flex:1;display:flex;
  flex-direction:column;justify-content:center;min-height:0;max-height:80px;}
.anc-card:hover{border-color:var(--accent-mid);background:var(--accent-light);}
.anc-card.center-card{border:2px solid var(--accent);background:var(--accent-light);}
.anc-card.male{border-left:4px solid var(--male);}
.anc-card.female{border-left:4px solid var(--female);}
.anc-card.center-card.male{border:2px solid var(--male);border-left-width:4px;background:var(--male-bg);}
.anc-card.center-card.female{border:2px solid var(--female);border-left-width:4px;background:var(--female-bg);}
.anc-empty{border-style:dashed;opacity:.35;cursor:default;}
.anc-name{font-size:12px;font-weight:bold;font-family:sans-serif;color:var(--text);line-height:1.25;}
.anc-dates{font-size:11px;color:var(--text-muted);font-family:sans-serif;margin-top:1px;}
#anc-placeholder{font-family:sans-serif;font-size:13px;color:var(--text-muted);padding:16px;}

/* ══ BOTTOM ROW ══ */
#bottom-row{display:grid;grid-template-columns:640px 1fr 1fr;gap:var(--gap);overflow:hidden;min-height:0;}

/* ── Block E ── */
#block-e{overflow-y:auto;}
#block-e-inner{padding:12px;}
#person-header{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}
#person-avatar{width:60px;height:60px;border-radius:50%;background:var(--accent-light);
  border:2px solid var(--accent-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--accent);overflow:hidden;font-family:sans-serif;}
#person-avatar.male{background:var(--male-bg);border-color:var(--male);color:var(--male);}
#person-avatar.female{background:var(--female-bg);border-color:var(--female);color:var(--female);}
#person-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
#person-name-block h2{font-size:17px;color:var(--accent);line-height:1.2;}
#person-name-block h2.male{color:var(--male);}
#person-name-block h2.female{color:var(--female);}
.callname-badge{display:inline-block;background:var(--amber-bg);color:var(--amber);font-size:11px;
  font-family:sans-serif;padding:1px 8px;border-radius:10px;margin-top:3px;border:1px solid var(--amber);}
.p-meta{font-size:12px;color:var(--text-sec);font-family:sans-serif;margin-top:2px;}
.event-list{list-style:none;margin-top:4px;}
.event-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);
  font-family:sans-serif;font-size:12px;align-items:flex-start;}
.event-item:last-child{border-bottom:none;}
.event-date{width:80px;flex-shrink:0;color:var(--text-muted);font-size:11px;line-height:1.5;}
.event-type{width:68px;flex-shrink:0;color:var(--amber);font-size:11px;text-transform:uppercase;
  letter-spacing:.4px;font-weight:bold;line-height:1.5;}
.event-desc{color:var(--text);flex:1;line-height:1.5;}
#no-selection{height:100%;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-family:sans-serif;font-size:13px;text-align:center;padding:20px;}
.bio-text{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
  font-family:sans-serif;font-size:13px;color:var(--text-sec);line-height:1.35;white-space:pre-wrap;}

/* ── Block G + F ── */
#block-g{overflow-y:auto;}
#block-g-inner{padding:8px;}
#block-f{overflow-y:auto;}
#block-f-inner{padding:8px;}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:6px 9px;margin-bottom:5px;cursor:pointer;font-family:sans-serif;font-size:12px;
  display:flex;align-items:center;gap:6px;transition:border-color .12s;}
.mini-card:hover{border-color:var(--accent-mid);}
.mini-card.self{border:2px solid var(--accent);background:var(--accent-light);}
.mini-card.male{border-left:3px solid var(--male);}
.mini-card.female{border-left:3px solid var(--female);}
.mini-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mini-dot.male{background:var(--male);}
.mini-dot.female{background:var(--female);}
.mini-dot.unknown{background:var(--text-muted);}
.mini-name{font-weight:bold;color:var(--text);line-height:1.25;flex:1;}
.mini-dates{font-size:11px;color:var(--text-muted);}
.sec-label{font-size:11px;font-family:sans-serif;text-transform:uppercase;letter-spacing:.7px;
  color:var(--text-muted);padding:7px 2px 3px;}
.sec-label:first-child{padding-top:2px;}
.rel-group{margin-bottom:6px;}
.rel-row{display:flex;align-items:center;gap:4px;}
.rel-toggle{font-size:12px;color:var(--amber);background:none;border:none;cursor:pointer;
  font-family:sans-serif;width:20px;flex-shrink:0;text-align:center;padding:0;line-height:1;}
.rel-children{padding-left:24px;border-left:2px solid var(--border);margin:3px 0 3px 10px;}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:3px;}

/* ══ LOADING ══ */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  align-items:center;justify-content:center;flex-direction:column;gap:12px;
  color:#fff;font-family:sans-serif;font-size:15px;}
#loading-overlay.show{display:flex;}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

[data-theme="parchment"] .anc-card{border-radius:3px;}
[data-theme="parchment"] .mini-card{border-radius:3px;}
[data-theme="parchment"] #person-avatar{border-radius:4px;}
</style>
</head>
<body data-theme="parchment">

<div id="loading-overlay">
  <div class="spinner"></div>
  <span id="loading-text">…</span>
</div>

<div id="header">
  <h1>Släkt<span>vis</span></h1>

  <!-- Öppna fil -->
  <div style="position:relative" id="open-menu-wrap">
    <button class="hdr-btn" onclick="toggleOpenMenu(event)" id="btn-open">📂 Öppna fil ▾</button>
    <div id="open-menu" style="display:none;position:absolute;top:calc(100% + 4px);left:0;
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      box-shadow:0 4px 16px rgba(0,0,0,.18);z-index:50;min-width:210px;overflow:hidden;">
      <div class="omenu-item" id="omenu-zip" onclick="document.getElementById('fi-zip').click();closeOpenMenu()">
        🗜 <span id="omenu-zip-label">ZIP-fil</span>
        <span id="omenu-zip-sub" style="font-size:11px;color:var(--text-muted);display:block">GEDCOM + porträttbilder</span>
      </div>
      <div class="omenu-item" id="omenu-ged" onclick="document.getElementById('fi-ged').click();closeOpenMenu()">
        📄 <span id="omenu-ged-label">GEDCOM-fil</span>
        <span id="omenu-ged-sub" style="font-size:11px;color:var(--text-muted);display:block">Utan bilder</span>
      </div>
    </div>
  </div>
  <input type="file" id="fi-zip" accept=".zip">
  <input type="file" id="fi-ged" accept=".ged,.gedcom">

  <!-- Tema -->
  <div id="theme-group">
    <button class="theme-btn" onclick="setTheme('light',this)" id="tbtn-light">☀ Ljust</button>
    <button class="theme-btn" onclick="setTheme('dark',this)" id="tbtn-dark">☾ Mörkt</button>
    <button class="theme-btn active" onclick="setTheme('parchment',this)" id="tbtn-parch">📜 Pergament</button>
  </div>

  <!-- Språk -->
  <div id="lang-group">
    <button class="lang-btn active" onclick="setLang('sv',this)" title="Svenska">🇸🇪</button>
    <button class="lang-btn" onclick="setLang('no',this)" title="Norsk">🇳🇴</button>
    <button class="lang-btn" onclick="setLang('da',this)" title="Dansk">🇩🇰</button>
    <button class="lang-btn" onclick="setLang('de',this)" title="Deutsch">🇩🇪</button>
    <button class="lang-btn" onclick="setLang('en',this)" title="English">🇬🇧</button>
  </div>

  <div id="info-block">
    <div id="info-count"><strong>—</strong></div>
    <div id="info-file" style="font-size:11px">—</div>
  </div>
  <div id="copyright">v0.1.13 &nbsp;|&nbsp; © 2025 Per Andersson</div>
</div>

<div id="main">
  <!-- LEFT -->
  <div id="left-col">
    <div class="panel" style="flex-shrink:0">
      <div id="search-box">
        <input type="text" id="search-input" oninput="filterPersons(this.value)">
      </div>
    </div>
    <div class="panel" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="panel-head" id="ph-persons">Alla personer</div>
      <div id="person-list" style="flex:1;overflow-y:auto">
        <div id="empty-state">
          <div class="icon">📖</div>
          <span id="empty-text">Öppna en fil för att börja.</span>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right-col">
    <!-- Block D -->
    <div class="panel" id="block-d">
      <div class="panel-head">
        <span id="ph-ancestors">Förfäder</span> — Block D
        <div class="view-btns">
          <button class="view-btn active" id="vbtn-antavla" onclick="setDView('antavla',this)" id="vbtn-antavla">Antavla</button>
          <button class="view-btn" id="vbtn-fan" onclick="setDView('fan',this)">Solfjäder</button>
        </div>
        <div class="gen-controls" id="gen-controls">
          <button class="gen-btn" id="gen-minus" onclick="changeGen(-1)">−</button>
          <span id="gen-count">4</span>
          <button class="gen-btn" id="gen-plus"  onclick="changeGen(+1)">+</button>
        </div>
      </div>
      <div id="block-d-inner">
        <div id="ancestor-chart">
          <div id="anc-placeholder"></div>
        </div>
        <div id="fan-chart"></div>
      </div>
    </div>

    <!-- Bottom E + G + F -->
    <div id="bottom-row">
      <!-- Block E -->
      <div class="panel" id="block-e">
        <div class="panel-head"><span id="ph-person">Person</span> — Block E</div>
        <div id="block-e-inner">
          <div id="no-selection"></div>
          <div id="person-details" style="display:none">
            <div id="person-header">
              <div id="person-avatar">?</div>
              <div id="person-name-block">
                <h2 id="person-name">—</h2>
                <div id="person-callname-badge" class="callname-badge" style="display:none"></div>
                <div class="p-meta" id="person-birth-name"></div>
                <div class="p-meta" id="person-years"></div>
              </div>
            </div>
            <ul class="event-list" id="event-list"></ul>
            <div id="bio-text" class="bio-text" style="display:none"></div>
          </div>
        </div>
      </div>
      <!-- Block G -->
      <div class="panel" id="block-g">
        <div class="panel-head"><span id="ph-famg">Föräldrar &amp; Syskon</span> — Block G</div>
        <div id="block-g-inner"></div>
      </div>
      <!-- Block F -->
      <div class="panel" id="block-f">
        <div class="panel-head"><span id="ph-relations">Relationer</span> — Block F</div>
        <div id="block-f-inner"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
/* ══════════════════════════════════════════
   I18N
══════════════════════════════════════════ */
const LANG={
  sv:{
    openFile:'📂 Öppna fil ▾',
    zipLabel:'ZIP-fil',zipSub:'GEDCOM + porträttbilder',
    gedLabel:'GEDCOM-fil',gedSub:'Utan bilder',
    themeLight:'☀ Ljust',themeDark:'☾ Mörkt',themeParch:'📜 Pergament',
    noFile:'Ingen fil laddad',
    allPersons:'Alla personer',
    ancestors:'Förfäder',
    person:'Person',
    famG:'Föräldrar & Syskon',
    relations:'Relationer',
    selectPerson:'Välj en person i listan.',
    selectDetail:'Välj en person för att se detaljer.',
    noParentsSiblings:'Inga kända föräldrar eller syskon.',
    noHits:'Inga träffar',
    openPrompt:'Öppna en fil för att börja.',
    loadingZip:'Öppnar ZIP-fil…',
    loadingFiles:'Läser filer…',
    loadingGed:'Tolkar GEDCOM…',
    loadingGedFile:'Läser GEDCOM-fil…',
    noGedInZip:'Ingen GEDCOM-fil hittades i ZIP-filen.',
    errorRead:'Kunde inte läsa filen.',

/* ══════════════════════════════════════════
   DISGEN HELPERS
══════════════════════════════════════════ */
function cleanName(r){return r?r.replace(/\*/g,'').replace(/\s+/g,' ').trim():'';}
function callName(r){if(!r)return null;const m=r.match(/\*(\S+)/);return m?m[1]:null;}

// Rensa Disgen ortstaggar: <EO=5Spetsbergen=> → Spetsbergen
// Mönster: <EO=5TEXT=> där TEXT är ortnamnet
function cleanDisgenTags(s){
  if(!s)return s;
  return s.replace(/<EO=\d+([^=]*)=>/g,'$1').trim();
}

// Bearbeta NOTE-text: filtrera $2-block, trimma $0/$1-tolkar, rensa ortstaggar
// Disgen lägger $0/$1/$2 som språkmarkörer, ibland mitt i en CONC-ihopsatt rad.
// Vi delar upp hela råtexten på dessa markörer och behåller bara $0- och $1-segment.
function processDisgenNote(rawLines){
  // Sätt ihop alla rader till en enda sträng (CONC är redan ihopsatt, CONT har \n)
  const full=rawLines.join('\n');
  // Dela på språkmarkörerna $0, $1, $2 – de förekommer i texten som segment-separatorer
  // Mönster: $0, $1, $2 kan stå i radstart eller efter \n
  const segments=full.split(/(?:^|\n)\s*\$([012])\s*/m);
  // split med capture-group ger: [före_första, code, text, code, text, ...]
  // Första elementet är text före första markör (kan vara tomt)
  const kept=[];
  // Hantera ev. text före första markör (okodad text – behåll)
  if(segments[0].trim())kept.push(cleanDisgenTags(segments[0]));
  // Iterera par: [code, text]
  for(let i=1;i<segments.length;i+=2){
    const code=segments[i];   // '0', '1', eller '2'
    const txt=segments[i+1]||'';
    if(code==='2')continue;   // Engelska – hoppa över
    // $0 = originalspråk (svenska), $1 = ev. annat nordiskt – behåll båda
    kept.push(cleanDisgenTags(txt.trim()));
  }
  return kept.filter(Boolean).join('\n\n').trim();
}

   FALLBACK-AVATARER (base64 SVG)
   AvatarM = blå siluett, AvatarF = rosa siluett
══════════════════════════════════════════ */
function makeSvgAvatar(sex){
  const fill=sex==='F'?'%239a2e72':'%232a5fa8';
  const bg=sex==='F'?'%23fae8f4':'%23e8f0fb';
  return `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'%3E%3Crect width='60' height='60' fill='${bg}'/%3E%3Ccircle cx='30' cy='22' r='11' fill='${fill}'/%3E%3Cellipse cx='30' cy='52' rx='18' ry='14' fill='${fill}'/%3E%3C/svg%3E`;
}

/* ══════════════════════════════════════════
   GEDCOM PARSER
══════════════════════════════════════════ */
function parseGedcom(text){
  const lines=text.split(/\r?\n/);
  const persons={},families={};
  let cur=null,ct=null,sub=null;
  let noteLines=[];
  const flushNote=()=>{if(cur&&ct==='I'&&noteLines.length){cur.noteRaw.push(...noteLines);}noteLines=[];};
  const newP=()=>({id:'',nameRaw:'',name:'',callname:null,nameGiven:'',nameSur:'',sex:'',
    birt:{date:'',place:''},deat:{date:'',place:''},buri:{date:'',place:''},
    chr:{date:'',place:''},occu:'',resi:[],obje:[],famc:[],fams:[],noteRaw:[]});
  const newF=()=>({id:'',husb:'',wife:'',chil:[]});

  for(const raw of lines){
    const m=raw.match(/^(\d+)\s+(@\S+@|\w+)\s*(.*)?$/);
    if(!m)continue;
    const lv=parseInt(m[1]),tag=m[2],val=(m[3]||'').trim();
    if(lv===0){
      flushNote();sub=null;
      if(tag.startsWith('@I')){cur=newP();cur.id=tag.replace(/@/g,'');persons[cur.id]=cur;ct='I';}
      else if(tag.startsWith('@F')){cur=newF();cur.id=tag.replace(/@/g,'');families[cur.id]=cur;ct='F';}
      else{cur=null;ct=null;}
      continue;
    }
    if(!cur)continue;
    if(ct==='I'){
      if(lv===1){
        if(sub==='NOTE')flushNote();
        sub=tag;
        if(tag==='NAME'){const rv=val.replace(/\//g,' ').replace(/\s+/g,' ').trim();cur.nameRaw=rv;cur.name=cleanName(rv);cur.callname=callName(rv);}
        else if(tag==='SEX')cur.sex=val;
        else if(tag==='OCCU')cur.occu=cleanDisgenTags(val);
        else if(tag==='FAMC')cur.famc.push(val.replace(/@/g,''));
        else if(tag==='FAMS')cur.fams.push(val.replace(/@/g,''));
        else if(tag==='NOTE'){noteLines=val?[val]:[];}
      }else if(lv===2){
        if(sub==='NAME'){if(tag==='GIVN')cur.nameGiven=cleanName(val);else if(tag==='SURN')cur.nameSur=cleanName(val);}
        else if(sub==='BIRT'){if(tag==='DATE')cur.birt.date=val;else if(tag==='PLAC')cur.birt.place=cleanDisgenTags(val);}
        else if(sub==='DEAT'){if(tag==='DATE')cur.deat.date=val;else if(tag==='PLAC')cur.deat.place=cleanDisgenTags(val);}
        else if(sub==='BURI'){if(tag==='DATE')cur.buri.date=val;else if(tag==='PLAC')cur.buri.place=cleanDisgenTags(val);}
        else if(sub==='CHR'){if(tag==='DATE')cur.chr.date=val;else if(tag==='PLAC')cur.chr.place=cleanDisgenTags(val);}
        else if(sub==='OBJE'&&tag==='FILE')cur.obje.push(val);
        else if(sub==='RESI'&&tag==='PLAC')cur.resi.push(cleanDisgenTags(val));
        else if(sub==='NOTE'){
          if(tag==='CONC'){if(noteLines.length)noteLines[noteLines.length-1]+=val;else noteLines.push(val);}
          else if(tag==='CONT')noteLines.push(val);
        }
      }
    }else if(ct==='F'&&lv===1){
      sub=tag;
      if(tag==='HUSB')cur.husb=val.replace(/@/g,'');
      else if(tag==='WIFE')cur.wife=val.replace(/@/g,'');
      else if(tag==='CHIL')cur.chil.push(val.replace(/@/g,''));
    }
  }
  flushNote();
  for(const p of Object.values(persons)){
    if(!p.name&&(p.nameGiven||p.nameSur))p.name=[p.nameGiven,p.nameSur].filter(Boolean).join(' ');
    if(!p.name)p.name='(Okänt namn)';
    p.bio=p.noteRaw.length?processDisgenNote(p.noteRaw):'';
  }
  return{persons,families};
}

function loadParsed(gedText,fileName){
  showLoad(t('loadingGed'));
  setTimeout(()=>{
    try{
      const{persons,families}=parseGedcom(gedText);
      S.persons=persons;S.families=families;
      const cnt=Object.keys(persons).length;
      document.getElementById('info-count').innerHTML=`<strong>${cnt.toLocaleString('sv-SE')}</strong> ${t('persons')}`;
      document.getElementById('info-file').textContent=fileName;
      buildList();clearSel();hideLoad();
    }catch(err){hideLoad();alert(t('errorParse')+err.message);console.error(err);}
  },10);
}

/* ── ZIP ── */
document.getElementById('fi-zip').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  showLoad(t('loadingZip'));
  try{
    const zip=await JSZip.loadAsync(file);
    let ged=null;
    for(const u of Object.values(S.images))URL.revokeObjectURL(u);
    Object.keys(S.images).forEach(k=>delete S.images[k]);
    const tasks=[];
    zip.forEach((path,entry)=>{
      if(entry.dir)return;
      const name=path.split('/').pop(),ext=name.split('.').pop().toLowerCase();
      if(ext==='ged'||ext==='gedcom')tasks.push(entry.async('text').then(tx=>{ged=tx;}));
      else if(['jpg','jpeg','png','gif','webp'].includes(ext))
        tasks.push(entry.async('blob').then(b=>{S.images[name.toLowerCase()]=URL.createObjectURL(b);}));
    });
    showLoad(t('loadingFiles'));
    await Promise.all(tasks);
    if(!ged){alert(t('noGedInZip'));hideLoad();return;}
    loadParsed(ged,file.name);
  }catch(err){hideLoad();alert(t('errorGeneric')+err.message);console.error(err);}
  e.target.value='';
});

/* ── GEDCOM direkt ── */
document.getElementById('fi-ged').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  showLoad(t('loadingGedFile'));
  for(const u of Object.values(S.images))URL.revokeObjectURL(u);
  Object.keys(S.images).forEach(k=>delete S.images[k]);
  const reader=new FileReader();
  reader.onload=ev=>loadParsed(ev.target.result,file.name);
  reader.onerror=()=>{hideLoad();alert(t('errorRead'));};
  reader.readAsText(file,'UTF-8');
  e.target.value='';
});

function sortKey(p){const pts=p.name.split(' ');return pts.length>1?pts[pts.length-1]+' '+pts[0]:p.name;}
function buildList(){
  const ids=Object.keys(S.persons).sort((a,b)=>sortKey(S.persons[a]).localeCompare(sortKey(S.persons[b]),'sv'));
  S.filteredIds=ids;renderList(ids);
}
function filterPersons(q){
  q=q.trim().toLowerCase();
  const all=Object.keys(S.persons).sort((a,b)=>sortKey(S.persons[a]).localeCompare(sortKey(S.persons[b]),'sv'));
  S.filteredIds=q?all.filter(id=>S.persons[id].name.toLowerCase().includes(q)):all;
  renderList(S.filteredIds);
}
function renderList(ids){
  const list=document.getElementById('person-list');
  if(!ids||!ids.length){list.innerHTML=`<div style="padding:16px;text-align:center;font-family:sans-serif;font-size:13px;color:var(--text-muted)">${t('noHits')}</div>`;return;}
  const frag=document.createDocumentFragment();
  for(const id of ids){
    const p=S.persons[id];
    const el=document.createElement('div');
    el.className='person-item'+(id===S.curId?' selected':'');
    el.dataset.id=id;
    const dates=[yr(p.birt.date),yr(p.deat.date)].filter(Boolean).join('–');
    let nh=esc(p.name);
    if(p.callname)nh=nh.replace(esc(p.callname),`<span class="callname">${esc(p.callname)}</span>`);
    el.innerHTML=`<div>${nh}</div>${dates?`<div class="p-dates">${dates}</div>`:''}`;
    el.onclick=()=>sel(id);
    frag.appendChild(el);
  }
  list.innerHTML='';list.appendChild(frag);
}

  document.getElementById('no-selection').style.display='flex';
  document.getElementById('person-details').style.display='none';
  document.getElementById('block-g-inner').innerHTML=`<div style="font-family:sans-serif;font-size:13px;color:var(--text-muted);padding:4px">${t('selectPerson')}</div>`;
  document.getElementById('block-f-inner').innerHTML=`<div style="font-family:sans-serif;font-size:13px;color:var(--text-muted);padding:4px">${t('selectPerson')}</div>`;
}

/* ══════════════════════════════════════════
   BLOCK D — Förfäder
   Höjdtabell (px): 3→160, 4→270, 5→351, 6→456
   = gen4 har gen5:s gamla höjd, gen5 har gen6:s gamla+30%
══════════════════════════════════════════ */
const GEN_HEIGHTS={3:160,4:270,5:583};
function genHeight(n){return GEN_HEIGHTS[n]||160;}

/* Vy-läge */
S.dView='antavla';

function setDView(mode,btn){
  S.dView=mode;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b===btn));
  const gc=document.getElementById('gen-controls');
  gc.style.display=mode==='antavla'?'flex':'none';
  const chart=document.getElementById('ancestor-chart');
  const fan=document.getElementById('fan-chart');
  if(mode==='antavla'){
    fan.style.display='none';
    chart.style.display='flex';
    chart.style.height=genHeight(S.genCount)+'px';
  } else {
    chart.style.display='none';
    fan.style.display='block';
  }
  if(S.curId)renderD(S.curId);
}

function changeGen(delta){
  const n=Math.min(5,Math.max(3,S.genCount+delta));
  if(n===S.genCount)return;
  S.genCount=n;
  document.getElementById('gen-count').textContent=n;
  document.getElementById('gen-minus').disabled=(n<=3);
  document.getElementById('gen-plus').disabled=(n>=5);
  document.getElementById('ancestor-chart').style.height=genHeight(n)+'px';
  if(S.curId)renderD(S.curId);
}
document.getElementById('gen-minus').disabled=false;
document.getElementById('gen-plus').disabled=false;

function getParents(pid){
  const p=S.persons[pid];if(!p)return[null,null];
  let f=null,m=null;
  for(const fid of p.famc){const fam=S.families[fid];if(!fam)continue;
    if(fam.husb&&S.persons[fam.husb])f=fam.husb;if(fam.wife&&S.persons[fam.wife])m=fam.wife;}
  return[f,m];
}
function buildGenTree(rootId,maxGen){
  let cols=[[rootId]];
  for(let g=1;g<maxGen;g++){
    const prev=cols[g-1],next=[];
    for(const id of prev){const[f,m]=id?getParents(id):[null,null];next.push(f,m);}
    cols.push(next);
    if(next.every(x=>!x))break;
  }
  return cols;
}

function renderD(id){
  if(S.dView==='fan') renderFan(id);
  else renderAntavla(id);
}

function renderAntavla(id){
  const chart=document.getElementById('ancestor-chart');
  chart.innerHTML='';
  const cols=buildGenTree(id,S.genCount);
  for(let ci=0;ci<cols.length;ci++){
    const colEl=document.createElement('div');
    colEl.className='anc-col'+(ci===0?' col-center':'');
    for(const pid of cols[ci])colEl.appendChild(makeAncCard(pid,ci===0?'center-card':''));
    chart.appendChild(colEl);
    if(ci<cols.length-1){
      const conn=document.createElement('div');conn.className='anc-connector';
      conn.innerHTML='<svg width="16" height="100%" viewBox="0 0 16 60" preserveAspectRatio="none" style="display:block;height:100%"><line x1="8" y1="0" x2="8" y2="60" stroke="var(--border)" stroke-width="1"/></svg>';
      chart.appendChild(conn);
    }
  }
}

function renderFan(id){
  const container=document.getElementById('fan-chart');
  container.innerHTML='';
  const p=S.persons[id];
  if(!p){container.innerHTML='<div style="font-family:sans-serif;font-size:13px;color:var(--text-muted);padding:16px">'+t('selectPerson')+'</div>';return;}

  const FAN_GENS=5;
  const cols=buildGenTree(id,FAN_GENS+1);

  const W=container.clientWidth||700;
  const H=583;
  const CX=W/2, CY=H-38;
  const RC=60;
  const RINGS=[RC,RC+90,RC+182,RC+268,RC+346,RC+416];

  const RING_M=['#c8daf5','#afc6f0','#96b2eb','#7d9ee6','#6490e1'];
  const RING_F=['#f5c8e8','#f0afd8','#eb96c8','#e67db8','#e164a8'];
  const RING_U=['#e8e4de','#ddd9d2','#d2cec6','#c7c3bb','#bcb8b0'];

  const START=Math.PI, TOTAL=Math.PI;

  function pt(r,a){return{x:CX+r*Math.cos(a),y:CY-r*Math.sin(a)};}

  function arc(r1,r2,a1,a2){
    const p1=pt(r1,a1),p2=pt(r1,a2),p3=pt(r2,a2),p4=pt(r2,a1);
    const lg=Math.abs(a2-a1)>Math.PI?1:0;
    return `M${p1.x},${p1.y} A${r1},${r1} 0 ${lg},0 ${p2.x},${p2.y} L${p3.x},${p3.y} A${r2},${r2} 0 ${lg},1 ${p4.x},${p4.y} Z`;
  }

  const cs=getComputedStyle(document.body);
  const cv=k=>cs.getPropertyValue(k).trim();

  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.style.cssText='display:block;width:100%;height:'+H+'px';

  // Center
  const cp2=S.persons[id];
  const cFill=cp2.sex==='M'?cv('--male-bg'):cp2.sex==='F'?cv('--female-bg'):cv('--bg');
  const cStroke=cp2.sex==='M'?cv('--male'):cp2.sex==='F'?cv('--female'):cv('--border');
  const cg=document.createElementNS(ns,'g');
  cg.style.cursor='pointer';cg.onclick=()=>sel(id);
  const cc=document.createElementNS(ns,'circle');
  cc.setAttribute('cx',CX);cc.setAttribute('cy',CY);cc.setAttribute('r',RC);
  cc.setAttribute('fill',cFill);cc.setAttribute('stroke',cStroke);cc.setAttribute('stroke-width','2');
  cg.appendChild(cc);
  const nameParts=shortN(cp2.name).split(' ');
  const lineH=12;
  nameParts.forEach((part,i)=>{
    const tx=document.createElementNS(ns,'text');
    tx.setAttribute('x',CX);
    tx.setAttribute('y',CY+(i-(nameParts.length-1)/2)*lineH);
    tx.setAttribute('text-anchor','middle');tx.setAttribute('dominant-baseline','middle');
    tx.setAttribute('font-size','10');tx.setAttribute('font-family','sans-serif');
    tx.setAttribute('fill','#1a1008');tx.setAttribute('font-weight','bold');
    tx.setAttribute('stroke','rgba(255,255,255,0.7)');tx.setAttribute('stroke-width','2');
    tx.setAttribute('paint-order','stroke');
    tx.setAttribute('pointer-events','none');tx.textContent=part;
    cg.appendChild(tx);
  });
  svg.appendChild(cg);

  // Ringar
  for(let g=1;g<=FAN_GENS&&g<cols.length;g++){
    const ring=cols[g];
    const count=ring.length;
    const step=TOTAL/count;
    const r1=RINGS[g-1],r2=RINGS[g];

    ring.forEach((pid,idx)=>{
      const a1=START-idx*step;
      const a2=START-(idx+1)*step;
      const pp=pid?S.persons[pid]:null;

      let fill,stroke,sw='1';
      if(pp){
        fill=pp.sex==='M'?RING_M[g-1]:pp.sex==='F'?RING_F[g-1]:RING_U[g-1];
        stroke=pp.sex==='M'?cv('--male'):pp.sex==='F'?cv('--female'):cv('--border');
      } else {fill='none';stroke=cv('--border');sw='0.5';}

      const path=document.createElementNS(ns,'path');
      path.setAttribute('d',arc(r1,r2,a2,a1));
      path.setAttribute('fill',fill||'none');
      path.setAttribute('stroke',stroke);
      path.setAttribute('stroke-width',sw);
      if(!pp)path.setAttribute('stroke-dasharray','3,3');
      if(pp){path.style.cursor='pointer';path.onclick=()=>sel(pid);}
      svg.appendChild(path);

      if(pp){
        const aMid=(a1+a2)/2;
        const rMid=(r1+r2)/2;
        const tx2=CX+rMid*Math.cos(aMid);
        const ty2=CY-rMid*Math.sin(aMid);
        // Rotationsvinkel: text följer ringen, alltid läsbart uppåt
        let rot=-aMid*(180/Math.PI);
        // Spegla om text hamnar upp-och-ned (vänster halva)
        if(aMid>Math.PI/2&&aMid<Math.PI*1.5)rot+=180;
        const segW=Math.abs(a1-a2)*rMid;
        const fs=g<=2?10:9;
        const tg2=document.createElementNS(ns,'g');
        tg2.setAttribute('transform',`translate(${tx2},${ty2}) rotate(${rot})`);
        tg2.setAttribute('pointer-events','none');

        const parts=shortN(pp.name).split(' ');
        const lh=fs+2;
        if(segW>25){
          parts.forEach((pt2,pi)=>{
            const te=document.createElementNS(ns,'text');
            te.setAttribute('x','0');
            te.setAttribute('y',(pi-(parts.length-1)/2)*lh+'');
            te.setAttribute('text-anchor','middle');te.setAttribute('dominant-baseline','middle');
            te.setAttribute('font-size',fs+'');te.setAttribute('font-family','sans-serif');
            te.setAttribute('fill','#1a1008');
            te.setAttribute('stroke','rgba(255,255,255,0.85)');
            te.setAttribute('stroke-width','2.5');
            te.setAttribute('paint-order','stroke');
            te.textContent=pt2;
            tg2.appendChild(te);
          });
          if(segW>40){
            const yv=yr(pp.birt.date),yd=yr(pp.deat.date);
            const ds=[yv,yd].filter(Boolean).join('–');
            if(ds){
              const td=document.createElementNS(ns,'text');
              td.setAttribute('x','0');td.setAttribute('y',(parts.length/2*lh + lh)+'');
              td.setAttribute('text-anchor','middle');td.setAttribute('dominant-baseline','middle');
              td.setAttribute('font-size','8');td.setAttribute('font-family','sans-serif');
              td.setAttribute('fill','#2a1008');
              td.setAttribute('stroke','rgba(255,255,255,0.9)');
              td.setAttribute('stroke-width','2');
              td.setAttribute('paint-order','stroke');
              td.textContent=ds;
              tg2.appendChild(td);
            }
          }
        } else if(segW>12){
          const te=document.createElementNS(ns,'text');
          te.setAttribute('x','0');te.setAttribute('y','0');
          te.setAttribute('text-anchor','middle');te.setAttribute('dominant-baseline','middle');
          te.setAttribute('font-size','8');te.setAttribute('font-family','sans-serif');
          te.setAttribute('fill','#1a1008');
          te.setAttribute('stroke','rgba(255,255,255,0.85)');
          te.setAttribute('stroke-width','2');
          te.setAttribute('paint-order','stroke');
          te.textContent=parts[0]||'';
          tg2.appendChild(te);
        }
        svg.appendChild(tg2);
      }
    });
  }
  container.appendChild(svg);
}
function sc(p){if(!p)return'';return p.sex==='M'?'male':p.sex==='F'?'female':'';}
function makeAncCard(id,extra){
  const d=document.createElement('div');
  const p=id?S.persons[id]:null;
  const s=sc(p);
  d.className='anc-card '+(extra||'')+' '+s;
  if(!p){d.classList.add('anc-empty');d.innerHTML=`<div class="anc-name" style="color:var(--text-muted)">${t('unknown')}</div>`;return d;}
  const dates=[yr(p.birt.date),yr(p.deat.date)].filter(Boolean).join('–');
  d.innerHTML=`<div class="anc-name">${esc(shortN(p.name))}</div>${dates?`<div class="anc-dates">${dates}</div>`:''}`;
  d.onclick=()=>sel(id);return d;
}

/* ══════════════════════════════════════════
   BLOCK E — Persondetaljer
══════════════════════════════════════════ */
function getAvatarUrl(p){
  // 1. Personens egna bilder
  for(const f of(p.obje||[])){const k=f.split(/[\/\\]/).pop().toLowerCase();if(S.images[k])return S.images[k];}
  // 2. AvatarM/AvatarF från ZIP
  if(p.sex==='M'&&S.images['avatarm.jpg'])return S.images['avatarm.jpg'];
  if(p.sex==='F'&&S.images['avatarf.jpg'])return S.images['avatarf.jpg'];
  // 3. Inbyggd SVG-siluett
  if(p.sex==='M')return AVATAR_M;
  if(p.sex==='F')return AVATAR_F;
  return null;
}

function renderE(id){
  const p=S.persons[id];if(!p)return;
  document.getElementById('no-selection').style.display='none';
  document.getElementById('person-details').style.display='block';
  const s=sc(p);
  const av=document.getElementById('person-avatar');
  av.className=s||'';av.innerHTML='';
  const imgUrl=getAvatarUrl(p);
  if(imgUrl){const img=document.createElement('img');img.src=imgUrl;av.appendChild(img);}
  else av.textContent=initials(p.name);

  const nh=document.getElementById('person-name');nh.textContent=p.name;nh.className=s;
  const badge=document.getElementById('person-callname-badge');
  if(p.callname){badge.style.display='inline-block';badge.textContent=t('called')+': '+p.callname;}
  else badge.style.display='none';
  document.getElementById('person-birth-name').textContent=p.nameSur?t('surname')+': '+p.nameSur:'';
  const y1=yr(p.birt.date),y2=yr(p.deat.date);
  const yrsEl=document.getElementById('person-years');
  if(y1||y2){const age=(y1&&y2)?` (${parseInt(y2)-parseInt(y1)} ${t('age')})`:'';
    yrsEl.textContent=t('born')+': '+(y1||'?')+(y2?' – '+t('died')+': '+y2+age:'');}
  else yrsEl.textContent='';

  const evs=[];
  if(p.birt.date||p.birt.place)evs.push({date:p.birt.date,type:t('evBorn'),desc:p.birt.place});
  if(p.chr.date||p.chr.place)evs.push({date:p.chr.date,type:t('evBapt'),desc:p.chr.place});
  if(p.occu)evs.push({date:'',type:t('evOccu'),desc:p.occu});
  for(const r of p.resi)evs.push({date:'',type:t('evRes'),desc:r});
  if(p.deat.date||p.deat.place)evs.push({date:p.deat.date,type:t('evDied'),desc:p.deat.place});
  if(p.buri.date||p.buri.place)evs.push({date:p.buri.date,type:t('evBuri'),desc:p.buri.place});

  const ul=document.getElementById('event-list');
  ul.innerHTML=evs.length?evs.map(ev=>`<li class="event-item">
    <span class="event-date">${esc(ev.date)}</span>
    <span class="event-type">${esc(ev.type)}</span>
    <span class="event-desc">${esc(ev.desc||'')}</span>
  </li>`).join(''):`<li style="padding:8px;font-family:sans-serif;font-size:13px;color:var(--text-muted)">—</li>`;
  const bioEl=document.getElementById('bio-text');
  if(p.bio){bioEl.style.display='block';bioEl.textContent=p.bio;}
  else{bioEl.style.display='none';bioEl.textContent='';}
}

/* ══════════════════════════════════════════
   BLOCK G — Föräldrar & Syskon
══════════════════════════════════════════ */
function renderG(id){
  const p=S.persons[id];
  const inner=document.getElementById('block-g-inner');
  inner.innerHTML='';
  if(!p){inner.innerHTML=`<div style="font-family:sans-serif;font-size:13px;color:var(--text-muted);padding:4px">${t('selectPerson')}</div>`;return;}
  let has=false;
  if(p.famc.length){
    const parents=[];
    for(const famId of p.famc){const fam=S.families[famId];if(!fam)continue;
      if(fam.husb&&S.persons[fam.husb])parents.push(fam.husb);
      if(fam.wife&&S.persons[fam.wife])parents.push(fam.wife);}
    if(parents.length){
      const lbl=document.createElement('div');lbl.className='sec-label';lbl.textContent=t('parents');
      inner.appendChild(lbl);
      for(const pid of parents)inner.appendChild(miniCard(pid,''));
      has=true;
    }
  }
  const siblings=[];
  for(const famId of p.famc){const fam=S.families[famId];if(!fam)continue;
    for(const cid of fam.chil)if(cid!==id&&S.persons[cid]&&!siblings.includes(cid))siblings.push(cid);}
  if(siblings.length){
    const all=[...siblings,id];
    all.sort((a,b)=>(yr(S.persons[a]?.birt.date)||'9999').localeCompare(yr(S.persons[b]?.birt.date)||'9999'));
    const lbl=document.createElement('div');lbl.className='sec-label';lbl.textContent=t('siblings');
    inner.appendChild(lbl);
    // Indenterad container precis som barn i Block F
    const sibDiv=document.createElement('div');sibDiv.className='rel-children';
    for(const sid of all)sibDiv.appendChild(miniCard(sid,sid===id?'self':''));
    inner.appendChild(sibDiv);
    has=true;
  }
  if(!has)inner.innerHTML=`<div style="font-family:sans-serif;font-size:13px;color:var(--text-muted);padding:4px">${t('noParentsSiblings')}</div>`;
}

/* ══════════════════════════════════════════
   BLOCK F — Relationer
══════════════════════════════════════════ */
function renderF(id){
  const p=S.persons[id];
  const inner=document.getElementById('block-f-inner');
  inner.innerHTML='';if(!p)return;
  const lbl0=document.createElement('div');lbl0.className='sec-label';lbl0.textContent=t('focusPerson');
  inner.appendChild(lbl0);inner.appendChild(miniCard(id,'self'));
  for(const famId of p.fams){
    const fam=S.families[famId];if(!fam)continue;
    const spId=p.sex==='M'?fam.wife:fam.husb;
    const lbl=document.createElement('div');lbl.className='sec-label';lbl.textContent=t('partner');
    inner.appendChild(lbl);
    const grp=document.createElement('div');grp.className='rel-group';
    const children=fam.chil.filter(cid=>S.persons[cid]);
    if(spId&&S.persons[spId]){
      const row=document.createElement('div');row.className='rel-row';
      const toggleBtn=document.createElement('button');toggleBtn.className='rel-toggle';toggleBtn.textContent='▼';
      row.appendChild(toggleBtn);row.appendChild(miniCard(spId,''));
      grp.appendChild(row);
      const childDiv=document.createElement('div');childDiv.className='rel-children';
      if(children.length){
        const cl=document.createElement('div');cl.className='sec-label';cl.textContent=t('children');childDiv.appendChild(cl);
        for(const cid of children)childDiv.appendChild(miniCard(cid,''));
      }else childDiv.innerHTML=`<div style="font-family:sans-serif;font-size:11px;color:var(--text-muted);padding:3px">${t('noChildren')}</div>`;
      grp.appendChild(childDiv);
      toggleBtn.onclick=()=>{const h=childDiv.style.display==='none';childDiv.style.display=h?'block':'none';toggleBtn.textContent=h?'▼':'▶';};
    }else if(children.length){
      const cl=document.createElement('div');cl.className='sec-label';cl.textContent=t('children');grp.appendChild(cl);
      for(const cid of children)grp.appendChild(miniCard(cid,''));
    }
    inner.appendChild(grp);
  }
}

function miniCard(id,extra){
  const d=document.createElement('div');
  const p=S.persons[id];if(!p)return d;
  const s=sc(p);
  d.className='mini-card '+(extra||'')+' '+s;
  const dates=[yr(p.birt.date),yr(p.deat.date)].filter(Boolean).join('–');
  d.innerHTML=`<div class="mini-dot ${s||'unknown'}"></div><div><div class="mini-name">${esc(p.name)}</div>${dates?`<div class="mini-dates">${dates}</div>`:''}</div>`;
  d.onclick=()=>sel(id);return d;
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function yr(s){if(!s)return'';const m=s.match(/\b(\d{4})\b/);return m?m[1]:'';}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initials(n){if(!n)return'?';return n.replace(/[()]/g,'').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');}
function shortN(n){if(!n||n.length<=22)return n;const p=n.split(' ');return p.length<=2?n:p[0]+' '+p[p.length-1];}
function showLoad(msg){document.getElementById('loading-text').textContent=msg;document.getElementById('loading-overlay').classList.add('show');}
function hideLoad(){document.getElementById('loading-overlay').classList.remove('show');}

/* ══ Init ══ */
applyLang();
</script>
